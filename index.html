<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB3 DASHBOARD | VECTOR-SKAM</title>
    <style>
        :root {
            --bg-vanille: #fefdf5; /* Ванильный фон */
            --accent-turquoise: #40e0d0; /* Бирюзовый акцент */
            --sidebar-bg: #ffffff;
            --text-main: #2c3e50;
            --border-soft: #eaeaea;
        }

        body {
            background-color: var(--bg-vanille);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif; /* Мягкий шрифт */
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ЛЕВОЕ МЕНЮ (Side Navigation) */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            z-index: 100;
        }

        .sidebar h1 {
            font-size: 16px;
            color: var(--accent-turquoise);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .nav-item {
            background: #fff;
            border: 1px solid var(--border-soft);
            color: var(--text-main);
            padding: 14px;
            text-decoration: none;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            border-radius: 10px; /* Округлые углы */
            text-transform: uppercase;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--accent-turquoise);
            color: white;
            border-color: var(--accent-turquoise);
            box-shadow: 0 4px 12px rgba(64, 224, 208, 0.3);
        }

        /* РАБОЧАЯ ОБЛАСТЬ (Center View) */
        .main-view {
            flex: 1;
            position: relative;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* КНОПКА МЕНЮ ДЛЯ ТЕЛЕФОНА */
        .mobile-toggle {
            display: none;
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--accent-turquoise);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -260px;
                height: 100%;
                transition: 0.3s;
            }
            .sidebar.open { left: 0; }
            .mobile-toggle { display: block; }
        }

        .clock-top {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 11px;
            color: var(--text-main);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <h1>WEB3 CP</h1>
        <div class="nav-list">
            <div class="nav-item active" onclick="openPage('https://web3trade.netlify.app', this)">web3trade</div>
            <div class="nav-item" onclick="openPage('https://web3video.netlify.app', this)">web3video</div>
            <div class="nav-item" onclick="openPage('https://web3audio.netlify.app', this)">web3audio</div>
            <div class="nav-item" onclick="openPage('https://web3file.netlify.app', this)">web3file</div>
            <div class="nav-item" onclick="openPage('https://web3system.netlify.app', this)">web3system</div>
            <div class="nav-item" onclick="openPage('https://web3computer.netlify.app', this)">web3computer</div>
            <div class="nav-item" onclick="openPage('https://web3mp3.netlify.app', this)">web3mp3</div>
            <div class="nav-item" onclick="openPage('https://web3image.netlify.app', this)">web3image</div>
            <div class="nav-item" onclick="openPage('https://bestkolageblock.netlify.app', this)">collage</div>
            <div class="nav-item" onclick="openPage('https://web3money.netlify.app', this)">web3money</div>
        </div>
        <div style="margin-top:auto; font-size:10px; text-align:center; opacity:0.4;">
            © 2026 VECTOR-SKAM
        </div>
    </nav>

    <div class="main-view">
        <div class="clock-top" id="clock">00:00:00</div>
        <iframe id="contentFrame" src="https://web3trade.netlify.app"></iframe>
    </div>

    <button class="mobile-toggle" onclick="toggleSidebar()">MENU</button>

    <script>
        function openPage(url, el) {
            document.getElementById('contentFrame').src = url;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('ru-RU');
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
