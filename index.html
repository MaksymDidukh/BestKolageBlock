<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEB3 DUAL TERMINAL | VECTOR-SKAM</title>
    <style>
        :root {
            --vanille: #fefdf5;
            --turquoise: #40e0d0;
            --text: #2c3e50;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--vanille);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ЛЕВОЕ МЕНЮ */
        .sidebar {
            width: var(--sidebar-w);
            background: white;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .nav-item {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #f0f0f0;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover {
            background: var(--turquoise);
            color: white;
        }

        /* ПРАВАЯ ЧАСТЬ - ДВА ЭКРАНА */
        .viewport-container {
            flex: 1;
            display: flex;
            flex-direction: column; /* Располагаем фреймы друг под другом */
            height: 100%;
        }

        .frame-section {
            flex: 1; /* Каждый фрейм занимает 50% высоты */
            position: relative;
            border-bottom: 2px solid var(--turquoise);
        }

        .frame-section:last-child { border-bottom: none; }

        .label {
            position: absolute;
            top: 5px;
            left: 10px;
            background: var(--turquoise);
            color: white;
            padding: 2px 10px;
            font-size: 10px;
            border-radius: 5px;
            z-index: 5;
            font-weight: bold;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* АДАПТИВНОСТЬ ДЛЯ МОБИЛОК */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; 
                height: auto; 
                flex-direction: row; 
                overflow-x: auto; 
                padding: 10px;
            }
            .nav-item { margin-right: 10px; min-width: 120px; margin-bottom: 0; }
            .viewport-container { height: calc(100vh - 80px); }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2 style="font-size: 14px; color: var(--turquoise); margin-bottom: 15px; text-align: center;">DASHBOARD</h2>
        <div class="nav-item" onclick="location.href='https://web3trade.netlify.app'">Trade Full</div>
        <div class="nav-item" onclick="location.href='https://web3video.netlify.app'">Video Full</div>
        <div class="nav-item" onclick="location.href='https://web3audio.netlify.app'">Audio Fun</div>
        <div class="nav-item" onclick="location.href='https://web3cp.netlify.app'">Hub Main</div>
        <div style="margin-top: auto; font-size: 10px; opacity: 0.5;">VECTOR-SKAM © 2026</div>
    </nav>

    <div class="viewport-container">
        
        <div class="frame-section">
            <div class="label">TRADING TERMINAL</div>
            <iframe src="https://web3trade.netlify.app"></iframe>
        </div>

        <div class="frame-section">
            <div class="label">VIDEO VIEWER 3x3</div>
            <iframe src="https://web3video.netlify.app"></iframe>
        </div>

    </div>

</body>
</html>
<script>
    function initWeb3AlwaysAlert() {
    // 1. Стили (оставляем те же, но без проверки localStorage)
    const style = document.createElement('style');
    style.textContent = `
        #web3-legal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95);
            z-index: 99999; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); font-family: sans-serif;
        }
        .web3-modal {
            background: #0d1117; color: #e6edf3; width: 90%; max-width: 550px;
            border-radius: 15px; border: 1px solid #30363d; padding: 25px;
            box-shadow: 0 0 50px rgba(0, 255, 163, 0.2);
        }
        .web3-content {
            height: 250px; overflow-y: auto; border: 1px solid #21262d;
            padding: 15px; border-radius: 8px; background: #010409;
            font-size: 13px; line-height: 1.6; color: #8b949e; margin: 15px 0;
        }
        .web3-confirm-btn {
            background: #238636; color: white; border: none; padding: 12px;
            border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%;
        }
        .web3-confirm-btn:hover { background: #2ea043; }
    `;
    document.head.appendChild(style);

    // Блокируем скролл основного сайта
    document.body.style.overflow = 'hidden';

    // 2. Создаем разметку
    const modal = document.createElement('div');
    modal.id = 'web3-legal-overlay';
    modal.innerHTML = `
        <div class="web3-modal">
            <h2 style="text-align:center; color:#58a6ff;">Legal Disclaimer</h2>
            <div class="web3-content">
                <p><b>ВНИМАНИЕ:</b> Вы входите на сайт web3my.netlify.app.</p>
                <p>Используя данный ресурс, вы подтверждаете, что:</p>
                <ul>
                    <li>Осознаете риски потери цифровых активов.</li>
                    <li>Действуете в соответствии с местным законодательством.</li>
                    <li>Не будете предъявлять претензий разработчикам в случае программных сбоев.</li>
                    <li>Ваши приватные ключи находятся только под вашим контролем.</li>
                </ul>
                <p>Данное предупреждение будет появляться при каждом входе в целях безопасности и напоминания о правилах платформы.</p>
            </div>
            <button id="web3-close" class="web3-confirm-btn">Я ПОНИМАЮ И СОГЛАСЕН</button>
        </div>
    `;

    document.body.appendChild(modal);

    // 3. Логика закрытия (без сохранения в память)
    document.getElementById('web3-close').onclick = () => {
        modal.remove();
        document.body.style.overflow = 'auto'; // Возвращаем скролл
    };
}

// Просто вызываем функцию при загрузке
initWeb3AlwaysAlert();
    
</script>
